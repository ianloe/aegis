version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Aegis — AI Governance & Safety Platform
# Docker Compose stack: app + MySQL + optional S3-compatible storage (MinIO)
#
# Quick start:
#   cp .env.example .env        # fill in your secrets
#   docker compose up -d        # start all services
#   docker compose logs -f app  # tail application logs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8 database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: aegis-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aegis}
      MYSQL_USER: ${MYSQL_USER:-aegis}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - aegis-db-data:/var/lib/mysql
    ports:
      - "${MYSQL_EXPOSE_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aegis-net

  # ── MinIO — S3-compatible object storage (optional, for file exports) ───────
  # Remove this service if you supply your own S3 bucket via STORAGE_* env vars.
  minio:
    image: minio/minio:latest
    container_name: aegis-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aegisadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aegissecret}
    volumes:
      - aegis-minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegis-net

  # ── Aegis application ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: aegis-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000

      # ── Database ──────────────────────────────────────────────────────────
      DATABASE_URL: mysql://${MYSQL_USER:-aegis}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-aegis}

      # ── Session / JWT ─────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}

      # ── Manus OAuth (required for login) ─────────────────────────────────
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-https://api.manus.im}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-https://auth.manus.im}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}

      # ── LLM / Forge API (for LLM log analysis and compliance reports) ─────
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}

      # ── Analytics (optional) ─────────────────────────────────────────────
      VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT:-}
      VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID:-}

    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - aegis-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/trpc/auth.me"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  aegis-db-data:
    driver: local
  aegis-minio-data:
    driver: local

# ── Internal network ──────────────────────────────────────────────────────────
networks:
  aegis-net:
    driver: bridge
